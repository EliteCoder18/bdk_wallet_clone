on: [push, pull_request]

# Main continuous integration workflow that runs build, test, and code quality checks.
# Runs on every push and pull request, testing against both MSRV (1.85) and stable Rust.
# Includes no_std and WASM compatibility checks, formatting validation, and clippy linting.

name: CI

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-msrv:
    name: Build & Test MSRV
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
        features:
          - --no-default-features --features miniscript/no-std,bdk_chain/hashbrown
          - --all-features
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # The 'toolchain' argument on this action overrides the Rust compiler version set in rust-toolchain.toml
      # in order to test our MSRV.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85 # MSRV
          cache: true
      - name: Use minimal lockfile for MSRV
        run: cp Cargo-minimal.lock Cargo.lock
      - name: Build + Test
        run: |
          cargo build --workspace --all-targets --locked ${{ matrix.features }}
          cargo test --workspace --locked ${{ matrix.features }}
  build-test-stable:
    name: Build & Test Rust Stable
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
        features:
          - --no-default-features --features miniscript/no-std,bdk_chain/hashbrown
          - --all-features
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # This action will honor the Rust compiler version set in rust-toolchain.toml. We aim to keep it in sync with
      # Rust stable.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - name: Use recent lockfile for stable
        run: cp Cargo-recent.lock Cargo.lock
      - name: Build + Test
        run: |
          cargo build --workspace --all-targets --locked ${{ matrix.features }}
          cargo test --workspace --locked ${{ matrix.features }}
  check-lockfiles:
    name: Check lockfiles are current
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Cache cargo-rbmt binary
        id: cache-rbmt
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-rbmt
          key: ${{ runner.os }}-cargo-rbmt-${{ hashFiles('rbmt-version') }}
      - name: Install cargo-rbmt
        if: steps.cache-rbmt.outputs.cache-hit != 'true'
        run: bash ci/install-rbmt.sh
      - name: Install toolchains from metadata
        run: cargo rbmt toolchains
      - name: Set up Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Regenerate lockfiles
        run: cargo rbmt lock
      - name: Verify lockfiles are up-to-date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Lockfiles are stale — run: cargo rbmt lock"
            git status --porcelain
            exit 1
          fi
          
  check-no-std:
    name: Check no_std
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # This action automatically reads and applies rust-toolchain.toml
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - name: Check no-std
        # TODO "--target thumbv6m-none-eabi" should work but currently does not
        run: cargo check --no-default-features --features miniscript/no-std,bdk_chain/hashbrown

  check-wasm:
    name: Check WASM
    runs-on: ubuntu-latest
    env:
      CC: clang-14
      CFLAGS: -I/usr/include
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
        # Install a recent version of clang that supports wasm32
      - run: wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add - || exit 1
      - run: sudo apt-get update || exit 1
      - run: sudo apt-get install -y libclang-common-14-dev clang-14 libc6-dev-i386 || exit 1
      # This action automatically reads and applies rust-toolchain.toml
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          target: wasm32-unknown-unknown
      - name: Check WASM
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check --target wasm32-unknown-unknown --no-default-features --features miniscript/no-std,bdk_chain/hashbrown
  fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # This action automatically reads and applies rust-toolchain.toml
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - name: Check fmt
        run: cargo fmt --all --check

  clippy_check:
    name: Rust clippy
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # This action automatically reads and applies rust-toolchain.toml
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - name: Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  docs_check:
    name: Check cargo doc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      # This action automatically reads and applies rust-toolchain.toml
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - name: Check docs
        run: RUSTDOCFLAGS='-D warnings' cargo doc --workspace --all-features --no-deps